<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subprime</title>
<style>
  :root {
    --bg: #14161c; --panel: #1e222c; --panel2: #262b38; --text: #e8eaf0;
    --dim: #9aa3b5; --line: #333a4a;
    --p0: #4f8ef7; --p1: #e05555; --p2: #e0a832; --p3: #a86ee0;
    --res: #58b368; --com: #5aa7d6; --ind: #d98a4a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 13px/1.4 system-ui, sans-serif;
         display: flex; flex-direction: column; height: 100vh;
         overflow: hidden; }
  header { display: flex; gap: 14px; align-items: center; padding: 6px 14px;
           background: var(--panel); border-bottom: 1px solid var(--line);
           flex-wrap: wrap; flex: none; }
  header h1 { font-size: 16px; margin: 0 6px 0 0; letter-spacing: 1px; }
  .stat { color: var(--dim); } .stat b { color: var(--text); }
  .rate { color: #ff7a7a; font-weight: 700; }
  button { background: var(--panel2); color: var(--text); cursor: pointer;
           border: 1px solid var(--line); border-radius: 6px; padding: 4px 10px;
           font: inherit; }
  button:hover:not(:disabled) { border-color: #6b7690; }
  button:disabled { opacity: .4; cursor: default; }
  button.primary { background: #2c4a8a; border-color: #3d62b3; }
  select { background: var(--panel2); color: var(--text);
           border: 1px solid var(--line); border-radius: 6px; padding: 5px; }
  main { display: grid; grid-template-columns: 240px 1fr 280px; gap: 10px;
         padding: 8px 12px; align-items: stretch; flex: 1; min-height: 0;
         overflow: hidden; }
  main > div { overflow-y: auto; min-height: 0; }
  main > div > :last-child, main > div > .row2:last-child .panel {
    margin-bottom: 0; }
  .row2 { display: flex; gap: 8px; }
  .row2 .panel { flex: 1; }
  .panel { background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; }
  .panel h2 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase;
              letter-spacing: 1px; color: var(--dim); display: flex;
              gap: 6px; align-items: center; }
  .qm { display: inline-flex; width: 15px; height: 15px; border-radius: 50%;
        background: #2a3040; color: #9aa3b5; font-size: 10px; flex: none;
        align-items: center; justify-content: center; cursor: help;
        text-transform: none; }
  .lrow { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
  .lrow .r { width: 46px; color: var(--dim); font-size: 12px; }
  .lrow .bar { flex: 1; height: 12px; background: #3a2a2a; border-radius: 3px;
               overflow: hidden; display: flex; }
  .lrow .fill { height: 100%; background: #7a5cd6; }
  .lrow .commit { height: 100%; background: #ecc35a; }
  .lrow.expired .bar { opacity: .25; }
  .lrow .n { width: 42px; text-align: right; font-size: 12px; color: var(--dim); }
  .player { position: relative; border-left: 4px solid; border-radius: 4px; background: var(--panel2);
            padding: 4px 8px; margin: 5px 0; }
  .player .nm { font-weight: 600; display: flex; justify-content: space-between;
                gap: 6px; flex-wrap: wrap; }
  .player .st { color: var(--dim); font-size: 11.5px; }
  .player.dead { opacity: .45; }
  .player .tag { font-size: 11px; padding: 1px 6px; border-radius: 8px;
                 background: #46340f; color: #ecc35a; }
  .player .tag.dead { background: #4a1f1f; color: #ff9a9a; }
  .player .tag.turn { background: #1f3a25; color: #7ade8f; }
  .bidtrack { display: flex; flex-wrap: wrap; gap: 4px; }
  .bspace { width: 34px; height: 38px; border: 1px dashed var(--line);
            border-radius: 6px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 11px;
            color: var(--dim); }
  .bspace.legal { border-style: solid; border-color: #4f8ef7; cursor: pointer; }
  .bspace.legal:hover { background: #22304a; }
  .bspace .dot { width: 14px; height: 14px; border-radius: 50%; }
  .tslot { min-width: 50px; height: 40px; border: 1px dashed var(--line);
           border-radius: 6px; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: 1px;
           font-size: 10px; color: var(--dim); padding: 1px 6px; }
  .tslot .who { font-size: 12px; font-weight: 700; display: flex;
                align-items: center; gap: 5px; }
  .tslot .dot { width: 12px; height: 12px; border-radius: 50%; }
  .tslot.filled { border-style: solid; }
  .tslot.acting { border-color: #7ade8f; background: #1c2a20; }
  .tslot.donebuy { opacity: .45; }
  .player .tag.pass { background: #2a3040; color: #aab6d0; }
  .net-pos { color: #7ade8f; }
  .net-neg { color: #ff8a8a; font-weight: 700; }
  #market { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 4px; }
  .mhead { font-size: 10.5px; color: var(--dim); text-transform: uppercase;
           letter-spacing: .5px; padding: 0 2px; }
  .card { border-radius: 6px; padding: 3px 6px; cursor: default;
          border: 2px solid transparent; color: #10131a; position: relative; }
  .card.res { background: var(--res); } .card.com { background: var(--com); }
  .card.ind { background: var(--ind); }
  .card .t { font-size: 10.5px; font-weight: 700; text-transform: uppercase; }
  .card .pr { font-size: 13.5px; font-weight: 800; }
  .card .pr .mk { font-size: 12px; opacity: .7; }
  .card .inc { font-size: 10.5px; }
  .card.buyable { cursor: pointer; box-shadow: 0 0 0 2px #ffffff55; }
  .card.buyable:hover { box-shadow: 0 0 0 3px #fff; }
  .card.sel { border-color: #fff; box-shadow: 0 0 0 3px #4f8ef7; }
  .card.empty { background: #20242e; border: 1px dashed var(--line);
                min-height: 44px; box-shadow: none; }
  .cash { position: absolute; top: -7px; right: -7px; background: #ecc35a;
          color: #201703; font-size: 11px; font-weight: 800; padding: 1px 6px;
          border-radius: 9px; }
  .cities { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .city { background: var(--panel2); border-radius: 8px; padding: 5px 7px; }
  .city h3 { margin: 0 0 3px; font-size: 11.5px; color: var(--dim); }
  .sect { border-radius: 6px; padding: 2px 5px; margin: 3px 0; min-height: 24px;
          border: 1px solid var(--line); }
  .sect .hd { font-size: 10.5px; text-transform: uppercase; color: var(--dim);
              display: flex; gap: 6px; align-items: center; }
  .sect.res .hd b { color: var(--res); } .sect.com .hd b { color: var(--com); }
  .sect.ind .hd b { color: var(--ind); }
  .sect.target { border-color: #4f8ef7; cursor: pointer; background: #22304a; }
  .sect.target:hover { background: #2a3c5e; }
  [data-tip] { position: relative; cursor: help; }
  [data-tip]:hover::after {
    content: attr(data-tip); position: absolute; left: 0; top: 100%;
    z-index: 20; width: 270px; background: #0c0e13; color: var(--text);
    border: 1px solid #46506a; border-radius: 7px; padding: 8px 10px;
    font-size: 12px; line-height: 1.4; white-space: pre-line;
    box-shadow: 0 6px 18px #000c; pointer-events: none; }
  .sect.target[data-tip]:hover::after { content: none; }
  .b { display: inline-flex; align-items: center; gap: 3px; font-size: 11px;
       border-radius: 4px; padding: 1px 5px; margin: 2px 2px 0 0;
       background: #171a22; }
  .b .own { width: 9px; height: 9px; border-radius: 50%; }
  .sub { font-size: 12px; }
  #actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
             min-height: 26px; }
  #hint { color: var(--dim); }
  #log { flex: 1; min-height: 0; overflow-y: auto; font-size: 11.5px;
         color: var(--dim); }
  #logpanel { display: flex; flex-direction: column; min-height: 0;
              margin-bottom: 0; overflow: hidden; }
  #log div { padding: 1.5px 0; border-bottom: 1px solid #20242e; }
  #log .you { color: #bcd3ff; }
  #over { position: fixed; inset: 0; background: #000a; display: flex;
          align-items: center; justify-content: center; }
  #over .box { background: var(--panel); border: 1px solid var(--line);
               border-radius: 12px; padding: 24px 32px; min-width: 340px; }
  #over h2 { margin-top: 0; }
  #over table { border-collapse: collapse; width: 100%; margin: 10px 0 16px; }
  #over td, #over th { padding: 4px 10px; text-align: left;
                       border-bottom: 1px solid var(--line); }
  .hidden { display: none !important; }
  main > div, .panel { min-width: 0; }
  .player .st, .player .nm { overflow-wrap: anywhere; }
  .px { image-rendering: pixelated; vertical-align: middle; }
  .csprite { position: absolute; top: 3px; right: 4px; opacity: .9; width: 18px; height: 18px; }
  .card { min-height: 44px; }
  .bwrap { display: inline-flex; flex-direction: column; align-items: center;
           margin: 1px; }
  .binc { font-size: 9px; color: var(--dim); line-height: 1.1; }
  .block { display: inline-flex; align-items: flex-end; gap: 1px;
           border: 1px solid; border-radius: 5px; padding: 1px 2px;
           margin: 2px 3px 0 0; background: #171a22; }
  @keyframes pop { 0% { transform: scale(.2); } 70% { transform: scale(1.3); }
                   100% { transform: scale(1); } }
  .pop { animation: pop .45s ease-out; }
  @keyframes shake { 0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); } 40% { transform: translateX(5px); }
    60% { transform: translateX(-4px); } 80% { transform: translateX(3px); } }
  .shake { animation: shake .5s; }
  @keyframes floatUp { 0% { opacity: 0; transform: translateY(8px); }
    15% { opacity: 1; } 100% { opacity: 0; transform: translateY(-28px); } }
  .floater { position: absolute; top: 4px; right: 10px; font-weight: 800;
             font-size: 15px; pointer-events: none; z-index: 30;
             animation: floatUp 1.15s ease-out forwards; }
  .floater.pos { color: #7ade8f; } .floater.neg { color: #ff8a8a; }
  header { position: relative; }
  @keyframes bannerIn {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.6); }
    12% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
    22% { transform: translate(-50%,-50%) scale(1); }
    78% { opacity: 1; } 100% { opacity: 0; } }
  #banner { position: fixed; left: 50%; top: 36%;
            transform: translate(-50%,-50%); font-size: 32px; font-weight: 900;
            letter-spacing: 2px; color: #fff; text-shadow: 0 3px 14px #000;
            background: #1e222cee; border: 1px solid #46506a;
            padding: 14px 36px; border-radius: 12px; z-index: 40;
            pointer-events: none; opacity: 0; white-space: nowrap; }
  #banner.show { animation: bannerIn 1.5s ease-out forwards; }
  @keyframes pulse { 0% { transform: scale(1); } 40% { transform: scale(1.6); }
                     100% { transform: scale(1); } }
  .pulse { display: inline-block; animation: pulse .55s; }
  #overav { text-align: center; margin-bottom: 6px; }
  .flyer { position: fixed; z-index: 50; pointer-events: none;
           display: flex; align-items: center; justify-content: center; }
  .flyer > * { visibility: visible !important; }
  @media (max-width: 1100px) {
    body { overflow: auto; height: auto; }
    main { grid-template-columns: 1fr; overflow: visible; }
    main > div { overflow-y: visible; }
    #log { max-height: 220px; flex: none; }
    .cities { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  }
</style>
</head>
<body>
<header>
  <h1>SUBPRIME</h1>
  <span class="stat">round <b id="round">–</b></span>
  <span class="stat">interest <b class="rate" id="rate">–</b></span>
  <span class="stat">loan markers <b id="markers">–</b></span>
  <span class="stat" id="phase"></span>
  <span style="flex:1"></span>
  <label class="stat">anim <select id="anim">
    <option value="normal">normal</option>
    <option value="fast">fast</option>
    <option value="off">off</option>
  </select></label>
  <label class="stat"><input type="checkbox" id="steep" checked> tuned rates</label>
  <select id="opps">
    <option value="digest,shark,greedy">digest / shark / greedy</option>
    <option value="digest,digest,digest">3 × digest (hard)</option>
    <option value="digest2,digest2,digest2">3 × digest2 (harder)</option>
    <option value="shark,shark,shark">3 × shark</option>
    <option value="greedy,timid,random">easy table</option>
  </select>
  <button class="primary" onclick="newGame()">New game</button>
</header>

<main>
  <div>
    <div class="panel"><h2>Players
      <span class="qm" data-tip="Income shown as base+subsidy. net = cash + income − interest: the money left after this round's bills. VP ties break on remaining cash.">?</span></h2>
      <div id="players"></div></div>
    <div class="panel"><h2>Loan track
      <span class="qm" data-tip="The interest rate is the deepest row with an uncovered space; an emptied row keeps showing its rate. Rows at or below the round number expire at cleanup. Amber = markers already claimed by bids on the bid track.">?</span>
      <span class="sub" id="lnote"></span></h2>
      <div id="ltrack"></div></div>
  </div>
  <div>
    <div class="panel"><h2 id="acthead">Your move</h2><div id="actions"></div>
      <div id="hint"></div></div>
    <div class="row2">
      <div class="panel" id="bidpanel"><h2>Bid track
        <span class="qm" data-tip="A bid = loans you take when you lock it in (1 loan = $10 now, interest every round, forever). Only the LOWEST bidder may act: raise or pass. Passing takes the latest free turn-order spot, so final turn order = bid order, highest first.">?</span></h2>
        <div class="bidtrack" id="btrack"></div></div>
      <div class="panel"><h2 id="tohead">Turn order
        <span class="qm" data-tip="During bidding this shows NEXT round's order, filling from the back as players pass. Higher bid = earlier turn = first pick of the market.">?</span></h2>
        <div class="bidtrack" id="torder"></div></div>
    </div>
    <div class="panel" id="mpanel"><h2>Market
      <span class="qm" data-tip="Price = printed cost + row markup (×3 fresh, ×2, ×1). Unsold cards slide toward row 1 at cleanup and get cheaper. Closed during foreclosure sales and scoring.">?</span>
      <span class="sub" id="mnote"></span></h2>
      <div id="market"></div></div>
    <div class="panel"><h2>Cities
      <span class="qm" data-tip="★ state subsidy: this city has the fewest of that building type — every owner in the zone earns +$1/card, and the zone leader scores 1 VP/building at game end. ● city subsidy: that player has the most in the zone — +$1/card (stacks with ★ to +$3/card). Shown as they'd be awarded at the next income phase. Hover a zone for details.">?</span></h2>
      <div class="cities" id="cities"></div></div>
  </div>
  <div class="panel" id="logpanel"><h2>Log</h2><div id="log"></div></div>
</main>

<div id="banner"></div>

<div id="over" class="hidden"><div class="box">
  <div id="overav"></div>
  <h2 id="overtitle"></h2><table id="scores"></table>
  <button onclick="G.overDismissed = true; render();">Inspect final board</button>
  <button class="primary" onclick="newGame()">Play again</button>
</div></div>

<script src="engine.js"></script>
<script src="agents.js"></script>
<script>
const E = SubprimeEngine, A = SubprimeAgents;
const PCOLS = ['#4f8ef7', '#e05555', '#e0a832', '#a86ee0'];
const COLORS = PCOLS;
const CSS = {residential: 'res', commercial: 'com', industrial: 'ind'};
const HUMAN = 0;
const SAVE_KEY = 'subprime-save';
const SAVE_VER = 2;   // bump when the state schema/rules change
const PREFS_KEY = 'subprime-prefs';

// ---------------------------------------------------------- pixel art
// Sprites are ASCII pixel maps rendered to canvas data-URIs (the page
// must stay self-contained — no external assets). Palette letters:
// O outline, W wall, G glass, D dark/door, A accent (owner-tinted),
// S skin, E eye, H hair.
const BUILDING_MAPS = {
  residential: [
    '............',
    '.....AA.....',
    '....AAAA....',
    '...AAAAAA...',
    '..AAAAAAAA..',
    '.AAAAAAAAAA.',
    '.OOOOOOOOOO.',
    '.OWGWWGWWGO.',
    '.OWGWWGWWGO.',
    '.OWWWWDDWWO.',
    '.OWWWWDDWWO.',
    '.OOOOOOOOOO.',
  ],
  commercial: [
    '............',
    '.OOOOOOOOOO.',
    '.OAAWAAWAAO.',
    '.OAAWAAWAAO.',
    '.OOOOOOOOOO.',
    '.OGGGGGGGGO.',
    '.OGGGGGGGGO.',
    '.OOOOOOOOOO.',
    '.OGGGOWWOGO.',
    '.OGGGOWWOGO.',
    '.OGGGOWWOGO.',
    '.OOOOOOOOOO.',
  ],
  industrial: [
    '.OO......OO.',
    '.OWO....OWO.',
    '.OWO....OWO.',
    '.OOOOOOOOOO.',
    '.OAAAAAAAAO.',
    '.OOOOOOOOOO.',
    '.OWGWGWGWGO.',
    '.OWWWWWWWWO.',
    '.OWWDDWWWWO.',
    '.OWWDDWWWWO.',
    '.OWWDDWWWWO.',
    '.OOOOOOOOOO.',
  ],
};
const BUILDING_PAL = {
  residential: {W: '#7fcf8e', G: '#eafff0', D: '#2e5e3a'},
  commercial:  {W: '#8fc3e8', G: '#eaf6ff', D: '#2c4b66'},
  industrial:  {W: '#e0aa72', G: '#ffe9c9', D: '#6e4522'},
};
const AVATAR_MAPS = [
  [ // P0: hard hat
    '....OOOO....',
    '...OAAAAO...',
    '..OAAAAAAO..',
    '.OAAAAAAAAO.',
    '.OOOOOOOOOO.',
    '.OSSSSSSSSO.',
    '.OSESSSSESO.',
    '.OSSSSSSSSO.',
    '..OSSDDSSO..',
    '...OOOOOO...',
    '..OAAAAAAO..',
    '..OOOOOOOO..',
  ],
  [ // P1: top hat
    '...OOOOOO...',
    '...OAAAAO...',
    '...OAAAAO...',
    '..OOAAAAOO..',
    '.OAAAAAAAAO.',
    '.OOOOOOOOOO.',
    '.OSSSSSSSSO.',
    '.OSESSSSESO.',
    '.OSSSDDSSSO.',
    '...OOOOOO...',
    '..OAAAAAAO..',
    '..OOOOOOOO..',
  ],
  [ // P2: cap with brim
    '....OOOO....',
    '...OAAAAO...',
    '..OAAAAAAOO.',
    '..OAAAAAAAO.',
    '..OOOOOOOOO.',
    '.OSSSSSSSSO.',
    '.OSESSSSESO.',
    '.OSSSSSSSSO.',
    '..OSSDDSSO..',
    '...OOOOOO...',
    '..OAAAAAAO..',
    '..OOOOOOOO..',
  ],
  [ // P3: hair bun
    '.....OO.....',
    '....OHHO....',
    '...OHHHHO...',
    '..OHHHHHHO..',
    '.OHHHHHHHHO.',
    '.OHSSSSSSHO.',
    '.OSESSSSESO.',
    '.OSSSSSSSSO.',
    '..OSSDDSSO..',
    '...OOOOOO...',
    '..OAAAAAAO..',
    '..OOOOOOOO..',
  ],
];
const _spriteCache = {};
function drawSprite(map, pal) {
  const k = map.join('') + JSON.stringify(pal);
  if (_spriteCache[k]) return _spriteCache[k];
  const h = map.length, w = map[0].length;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const base = {O: '#0e1116', E: '#14181f', S: '#e9b587',
                D: '#3a3f4e', H: '#6b4a2f', W: '#c9cfdd', G: '#eef4ff'};
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const col = pal[map[y][x]] || base[map[y][x]];
    if (!col) continue;
    ctx.fillStyle = col;
    ctx.fillRect(x, y, 1, 1);
  }
  return _spriteCache[k] = c.toDataURL();
}
function bSprite(type, owner) {
  const accent = owner === null || owner === undefined
    ? '#666c7c' : PCOLS[owner];
  return drawSprite(BUILDING_MAPS[type],
                    Object.assign({A: accent}, BUILDING_PAL[type]));
}
function avatar(pid) {
  return drawSprite(AVATAR_MAPS[pid % AVATAR_MAPS.length], {A: PCOLS[pid]});
}
const avImg = (pid, px = 20) =>
  `<img class="px" src="${avatar(pid)}" width="${px}" height="${px}" alt="">`;

// ------------------------------------------------------------- prefs
function savePrefs() {
  try {
    localStorage.setItem(PREFS_KEY, JSON.stringify({
      steep: document.getElementById('steep').checked,
      opps: document.getElementById('opps').value,
      anim: document.getElementById('anim').value,
    }));
  } catch (e) {}
}

function loadPrefs() {
  try {
    const d = JSON.parse(localStorage.getItem(PREFS_KEY) || 'null');
    if (!d) return;
    document.getElementById('steep').checked = !!d.steep;
    const sel = document.getElementById('opps');
    if ([...sel.options].some(o => o.value === d.opps)) sel.value = d.opps;
    const an = document.getElementById('anim');
    if ([...an.options].some(o => o.value === d.anim)) an.value = d.anim;
  } catch (e) {}
}
let G = null;        // {state, agents, names, cursor}
let sel = null;
let viewLive = true;   // false while rendering a replay frame
let playing = false, skipReq = false;

// --------------------------------------------- state (de)serialization
function stateToPlain(s) {
  return Object.assign({}, s, {
    rng: s.rng.state(),
    buyPassed: [...s.buyPassed],
    stateSubsidies: [...s.stateSubsidies],
    bailedOut: [...s.bailedOut],
    unable: [...s.unable],
    // lots reference Buildings inside cities; store their position so
    // load can re-link instead of JSON duplicating them
    bailoutLots: s.bailoutLots.map(l => ({ city: l.city,
      ref: l.bldg ? { t: l.bldg.card.type,
                      i: s.cities[l.city][l.bldg.card.type].indexOf(l.bldg) }
                  : null })),
  });
}
function stateFromPlain(s) {
  s.rng = E.makeRng(s.rng);
  s.buyPassed = new Set(s.buyPassed);
  s.stateSubsidies = new Set(s.stateSubsidies);
  s.bailedOut = new Set(s.bailedOut);
  s.unable = new Set(s.unable || []);
  s.bailoutLots = (s.bailoutLots || []).map(l => ({ city: l.city,
    bldg: l.ref ? s.cities[l.city][l.ref.t][l.ref.i] : null }));
  return s;
}

function saveGame() {
  if (!G) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: SAVE_VER,
      names: G.names, overDismissed: G.overDismissed,
      agents: G.agents.map(a => a === null ? null : {
        kind: a instanceof A.RandomAgent ? 'random' : 'heuristic',
        params: a.p || null, rng: a.rng.state(),
      }),
      state: stateToPlain(G.state),
    }));
  } catch (e) { /* storage unavailable: play on without saves */ }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.v !== SAVE_VER || !d.state || !d.state.phase) return false;
    const s = stateFromPlain(d.state);
    const agents = d.agents.map(a => {
      if (!a) return null;
      const agent = a.kind === 'random'
        ? new A.RandomAgent(0) : new A.HeuristicAgent(a.params, 0);
      agent.rng = E.makeRng(a.rng);
      return agent;
    });
    G = { state: s, agents, names: d.names, cursor: 0,
          overDismissed: !!d.overDismissed };
    return true;
  } catch (e) { return false; }
}

// --------------------------------------------------- game + animation
// Every applied action becomes a replay "frame": a snapshot of the
// state right after it, plus effects derived by diffing (new buildings
// pop, money floats, rate pulses, phase banners). Frames play back in
// order so you can watch what the table did before it's your turn.
function step(pid, action) {
  const s = G.state;
  const pre = {
    phase: s.phase, round: s.round, rate: E.currentRate(s),
    money: s.players.map(p => p.money),
    bankrupt: s.players.map(p => p.bankrupt),
    counts: s.cities.map(c => E.TYPES.map(t => c[t].length)),
    bids: Object.assign({}, s.bids),
    disp: s.display.map(row => row.map(c => c ? c.card.id : null)),
  };
  // a foreclosure sale moves an existing building between blocks —
  // remember which one, the count diff below won't see it
  let moved = null;
  if (action[0] === 'bailout_buy') {
    const lot = s.bailoutLots[action[1]];
    moved = {ci: lot.city, zone: lot.bldg.card.type,
             idx: s.cities[lot.city][lot.bldg.card.type].indexOf(lot.bldg)};
  }
  E.applyAction(s, action);
  const fx = [];
  // 1. the action itself, with its spatial link
  if (action[0] === 'bid') {
    fx.push({t: 'bid', v: action[1], pid, fromBid: pre.bids[pid]});
  }
  if (action[0] === 'pass' &&
      (pre.phase === 'bid_initial' || pre.phase === 'bid_raise')) {
    const inBid = s.phase === 'bid_initial' || s.phase === 'bid_raise';
    const spot = (inBid ? s.nextOrder : s.turnOrder).indexOf(pid);
    fx.push({t: 'pass', pid, spot, fromBid: pre.bids[pid], inBid});
  }
  if (moved) fx.push(Object.assign({t: 'moved'}, moved));
  s.cities.forEach((c, ci) => E.TYPES.forEach((tp, ti) => {
    for (let k = pre.counts[ci][ti]; k < c[tp].length; k++) {
      const from = action[0] === 'buy'
        ? {r: action[1], c: action[2]} : null;
      fx.push({t: 'built', ci, zone: tp, idx: k, from});
    }
  }));
  // 2. money, rate, bankruptcies
  s.players.forEach((p, i) => {
    const d = p.money - pre.money[i];
    if (d) fx.push({t: 'money', pid: i, d});
  });
  const rate = E.currentRate(s);
  if (rate > pre.rate) fx.push({t: 'rate', from: pre.rate, to: rate});
  s.players.forEach((p, i) => {
    if (p.bankrupt && !pre.bankrupt[i]) fx.push({t: 'bankrupt', pid: i});
  });
  // 3. market movement at cleanup: surviving cards slide, then new
  //    cards deal in one by one
  const postIds = {}, preIds = {};
  s.display.forEach((row, r) => row.forEach((cell, c) => {
    if (cell) postIds[cell.card.id] = {r, c};
  }));
  pre.disp.forEach((row, r) => row.forEach((id, c) => {
    if (id !== null) preIds[id] = {r, c};
  }));
  for (const id of Object.keys(postIds)) {
    const to = postIds[id], from = preIds[id];
    if (from && (from.r !== to.r || from.c !== to.c)) {
      fx.push({t: 'slide', from, to});
    }
  }
  Object.keys(postIds).filter(id => !preIds[id]).map(id => postIds[id])
    .sort((a, b) => a.c - b.c || b.r - a.r)
    .forEach(d => fx.push({t: 'deal', r: d.r, c: d.c}));
  // 4. announce what comes next
  if (s.phase !== pre.phase) {
    const banners = {
      buy: 'BUY REAL ESTATE',
      bailout: '💥 BANKRUPTCY',
      over: 'GAME OVER',
    };
    if (s.phase === 'bid_initial' && s.round !== pre.round) {
      fx.push({t: 'banner', text: `ROUND ${s.round} — BID FOR LOANS`});
    } else if (banners[s.phase]) {
      fx.push({t: 'banner', text: banners[s.phase]});
    }
  }
  return {snap: JSON.parse(JSON.stringify(stateToPlain(s))),
          fx, evEnd: s.events.length};
}

function runAgents(frames) {
  const s = G.state;
  while (s.phase !== 'over' && E.decisionPlayer(s) !== HUMAN) {
    const pid = E.decisionPlayer(s);
    frames.push(step(pid, G.agents[pid].act(s, pid, E.legalActions(s))));
  }
}

function act(action) {
  if (playing) return;
  const frames = [];
  try {
    frames.push(step(HUMAN, action));
  } catch (e) { logLine('⚠ ' + e.message); return; }
  sel = null;
  runAgents(frames);
  playFrames(frames);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function playFrames(frames) {
  const speed = document.getElementById('anim').value;
  const mult = speed === 'off' ? 0 : speed === 'fast' ? 0.5 : 1;
  if (!mult || !frames.length) { render(); return; }
  playing = true; skipReq = false;
  document.getElementById('phase').textContent = '▶ replaying… (click to skip)';
  for (const f of frames) {
    if (skipReq) break;
    // measure flight ORIGINS in the previous frame's DOM, then render the
    // new state with flight DESTINATIONS hidden, and fly between them
    const src = measureSources(f.fx);
    render(stateFromPlain(f.snap), false);
    G.state.events.slice(G.cursor, f.evEnd).forEach(logLine);
    G.cursor = f.evEnd;
    prepareHidden(f.fx);
    await runFxSeq(f.fx, src, mult);
    if (!skipReq) await sleep(140 * mult);
  }
  playing = false; skipReq = false;
  document.querySelectorAll('.flyer').forEach(e => e.remove());
  document.getElementById('banner').classList.remove('show');
  render();
}

const rectOf = sel => {
  const el = document.querySelector(sel);
  return el ? el.getBoundingClientRect() : null;
};

function measureSources(fx) {
  const m = {};
  fx.forEach((x, i) => {
    if (x.t === 'built' && x.from) {
      m[i] = rectOf(`[data-mc="${x.from.r},${x.from.c}"]`);
    } else if (x.t === 'moved') {
      m[i] = rectOf(`[data-b="${x.ci},${x.zone},${x.idx}"]`);
    } else if (x.t === 'slide') {
      m[i] = rectOf(`[data-mc="${x.from.r},${x.from.c}"]`);
    } else if (x.t === 'pass' || x.t === 'bid') {
      m[i] = x.fromBid !== undefined
        ? rectOf(`.bspace[data-bid="${x.fromBid}"] img`)
        : rectOf(`#players .player[data-pp="${x.pid}"] img`);
    }
  });
  return m;
}

function setVis(sel, hidden) {
  const el = document.querySelector(sel);
  if (el) el.style.visibility = hidden ? 'hidden' : '';
  return el;
}

function prepareHidden(fx) {
  for (const x of fx) {
    if (x.t === 'built' || x.t === 'moved') {
      setVis(`[data-b="${x.ci},${x.zone},${x.idx}"]`, true);
    } else if (x.t === 'pass' && x.spot >= 0) {
      setVis(`#torder .tslot[data-slot="${x.spot}"] img`, true);
    } else if (x.t === 'bid') {
      setVis(`.bspace[data-bid="${x.v}"] img`, true);
    } else if (x.t === 'deal') {
      setVis(`[data-mc="${x.r},${x.c}"]`, true);
    } else if (x.t === 'slide') {
      setVis(`[data-mc="${x.to.r},${x.to.c}"]`, true);
    }
  }
}

function reveal(sel, pop) {
  const el = setVis(sel, false);
  if (el && pop) el.classList.add('pop');
  return el;
}

// fly `html` (sized w×h) from the center of `from` to the center of `to`
function fly(html, from, to, ms, w = 24, h = 24) {
  if (!from || !to) return sleep(0);
  const d = document.createElement('div');
  d.className = 'flyer';
  d.innerHTML = html;
  d.style.width = w + 'px'; d.style.height = h + 'px';
  d.style.left = (from.left + from.width / 2 - w / 2) + 'px';
  d.style.top = (from.top + from.height / 2 - h / 2) + 'px';
  d.style.transition = `transform ${ms}ms cubic-bezier(.45,.05,.35,1)`;
  document.body.appendChild(d);
  void d.offsetWidth;
  const dx = (to.left + to.width / 2) - (from.left + from.width / 2);
  const dy = (to.top + to.height / 2) - (from.top + from.height / 2);
  d.style.transform = `translate(${dx}px, ${dy}px)`;
  return sleep(ms).then(() => d.remove());
}

async function runFxSeq(fx, src, mult) {
  const S = ms => sleep(ms * mult);
  const bspr = (zone, ci) =>
    `<img class="px" src="${bSprite(zone, null)}" width="24" height="24">`;
  let i = 0;
  while (i < fx.length) {
    if (skipReq) return;
    const x = fx[i];
    if (x.t === 'money') {
      // simultaneous income/interest: float together, one beat
      while (i < fx.length && fx[i].t === 'money') {
        const m = fx[i];
        floater(document.querySelector(`#players .player[data-pp="${m.pid}"]`),
                (m.d > 0 ? '+$' : '−$') + Math.abs(m.d),
                m.d > 0 ? 'pos' : 'neg');
        i++;
      }
      await S(780);
      continue;
    }
    if (x.t === 'slide') {
      // one cleanup: all surviving cards glide to their new cells together
      const flights = [];
      while (i < fx.length && fx[i].t === 'slide') {
        const sl = fx[i];
        const destSel = `[data-mc="${sl.to.r},${sl.to.c}"]`;
        const destEl = document.querySelector(destSel);
        const to = destEl && destEl.getBoundingClientRect();
        const from = src[i];
        flights.push(fly(destEl ? destEl.outerHTML : '', from, to, 420 * mult,
                         from ? from.width : 80, from ? from.height : 58)
          .then(() => reveal(destSel, false)));
        i++;
      }
      await Promise.all(flights);
      await S(120);
      continue;
    }
    switch (x.t) {
      case 'bid': {
        await fly(avImg(x.pid, 18), src[i],
                  rectOf(`.bspace[data-bid="${x.v}"]`), 430 * mult, 18, 18);
        reveal(`.bspace[data-bid="${x.v}"] img`, true);
        await S(160);
        break;
      }
      case 'pass': {
        if (x.spot >= 0) {
          await fly(avImg(x.pid, 18), src[i],
                    rectOf(`#torder .tslot[data-slot="${x.spot}"]`),
                    460 * mult, 18, 18);
          reveal(`#torder .tslot[data-slot="${x.spot}"] img`, true);
        }
        await S(180);
        break;
      }
      case 'built': {
        const sel = `[data-b="${x.ci},${x.zone},${x.idx}"]`;
        if (x.from && src[i]) {
          await fly(bspr(x.zone), src[i], rectOf(sel), 460 * mult);
        }
        reveal(sel, true);
        await S(260);
        break;
      }
      case 'moved': {
        const sel = `[data-b="${x.ci},${x.zone},${x.idx}"]`;
        await fly(bspr(x.zone), src[i], rectOf(sel), 460 * mult);
        reveal(sel, true);
        await S(260);
        break;
      }
      case 'deal': {
        reveal(`[data-mc="${x.r},${x.c}"]`, true);
        await S(180);
        break;
      }
      case 'rate': {
        const el = document.getElementById('rate');
        el.classList.remove('pulse');
        void el.offsetWidth;
        el.classList.add('pulse');
        floater(document.querySelector('header'), `rate ↑ $${x.to}`, 'neg');
        await S(600);
        break;
      }
      case 'bankrupt': {
        const panel =
          document.querySelector(`#players .player[data-pp="${x.pid}"]`);
        if (panel) panel.classList.add('shake');
        showBanner(`💥 ${G.names[x.pid].toUpperCase()} IS BANKRUPT`);
        await S(1100);
        break;
      }
      case 'banner': {
        showBanner(x.text);
        await S(950);
        break;
      }
      default: await S(200);
    }
    i++;
  }
}

function showBanner(text) {
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.remove('show');
  void b.offsetWidth;          // restart the CSS animation
  b.classList.add('show');
}

function floater(anchor, text, cls) {
  if (!anchor) return;
  const f = document.createElement('div');
  f.className = 'floater ' + cls;
  f.textContent = text;
  anchor.appendChild(f);
  setTimeout(() => f.remove(), 1200);
}

function newGame() {
  if (playing) return;
  const opps = document.getElementById('opps').value.split(',');
  const cfg = E.defaultConfig();
  if (document.getElementById('steep').checked) {
    cfg.loanRowRates = [2, 3, 4, 6, 8, 10];
  }
  const seed = (Math.random() * 0xffffffff) >>> 0;
  const state = E.newGame(cfg, 1 + opps.length, seed, true);
  const agents = [null, ...opps.map((n, i) => A.REGISTRY[n](seed + 1 + i))];
  const names = ['You', ...opps.map((n, i) => `P${i + 1} (${n})`)];
  document.getElementById('log').innerHTML = '';
  G = {state, agents, names, cursor: 0, overDismissed: false};
  sel = null;
  const frames = [];
  runAgents(frames);
  playFrames(frames);
}

function logLine(t) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = t;
  if (t.includes('You')) d.className = 'you';
  el.prepend(d);
}
const esc = (x) => String(x).replace(/[&<>]/g,
  c => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[c]));

function humanTurn(s) {
  return s.phase !== 'over' && E.decisionPlayer(s) === HUMAN;
}
function legalFor(s) {
  return viewLive && humanTurn(s) ? E.legalActions(s) : [];
}

function cardHTML(cell, mult, cls = '', extra = '') {
  if (!cell) return `<div class="card empty" ${extra}></div>`;
  const money = cell.money ? `<span class="cash">$${cell.money}</span>` : '';
  const base = cell.card.cost, markup = base * (mult - 1);
  const pr = markup > 0 ? `$${base}<span class="mk">+$${markup}</span>`
                        : `$${base}`;
  return `<div class="card ${CSS[cell.card.type]} ${cls}" ${extra}>${money}
    <img class="px csprite" src="${bSprite(cell.card.type, null)}"
         width="22" height="22" alt="">
    <div class="t">${cell.card.type.slice(0, 3)}</div>
    <div class="pr">${pr}</div>
    <div class="inc">+$${cell.card.income}/rd</div></div>`;
}

// subsidies to show: the actually-placed markers while the game is being
// scored (bailout/over), otherwise as they'd be awarded right now
function currentSubs(s) {
  if (s.phase === 'bailout' || s.phase === 'over') {
    return [s.stateSubsidies, s.citySubsidies];
  }
  return E.determineSubsidies(s.cities);
}

function projIncome(s, stateSubs, citySubs, pid) {
  let total = 0;
  s.cities.forEach((city, ci) => {
    for (const t of E.TYPES) {
      const st = stateSubs.has(E.key(ci, t));
      const cs = citySubs[E.key(ci, t)];
      for (const b of city[t]) {
        if (b.owner !== pid) continue;
        const bonus = st && cs === pid ? s.cfg.doubleSubsidyBonus
                    : (st || cs === pid) ? s.cfg.singleSubsidyBonus : 0;
        total += b.card.income + bonus;
      }
    }
  });
  return total;
}

function render(viewState, live = true) {
  viewLive = live;
  const s = viewState || G.state;
  if (live) {
    saveGame();
    s.events.slice(G.cursor).forEach(logLine);
    G.cursor = s.events.length;
    document.getElementById('phase').textContent = 'phase: ' + s.phase;
  }

  document.getElementById('round').textContent = `${s.round}/${s.cfg.maxRounds}`;
  document.getElementById('rate').textContent =
    '$' + E.currentRate(s) + (s.cfg.interestPerLoan ? '/loan' : '');
  document.getElementById('markers').textContent = E.markersLeft(s);

  // players
  const [stateSubs, citySubs] = currentSubs(s);
  const vps = E.scoreBreakdown(s);
  const dp = s.phase === 'over' ? null : E.decisionPlayer(s);
  document.getElementById('players').innerHTML = s.players.map((p, i) => {
    const due = E.interestDue(s, p);
    const income = projIncome(s, stateSubs, citySubs, i);
    const base = s.cities.reduce((n, c) => n + E.TYPES.reduce((m, t) =>
      m + c[t].filter(b => b.owner === i)
              .reduce((k, b) => k + b.card.income, 0), 0), 0);
    const subs = income - base;
    const bld = s.cities.reduce((n, c) => n + E.ownedCount(c, i), 0);
    const tags = [];
    if (p.bankrupt) tags.push('<span class="tag dead">BANKRUPT</span>');
    else if (dp === i) tags.push('<span class="tag turn">acting</span>');
    if (s.phase === 'buy' && s.buyPassed.has(i) && !p.bankrupt) {
      tags.push('<span class="tag pass">passed</span>');
    }
    if (s.bailedOut.has(i)) tags.push('<span class="tag">bailed out</span>');
    const v = vps[i];
    const vpTip = v ? `${v.total} VP = ${v.buildings} buildings + ` +
      `${v.majorities} city majorities + ${v.state} state-subsidy` : '';
    const vpBit = s.phase === 'over'
      ? `<b>${p.vp} VP</b>`
      : v ? `<b data-tip="${vpTip}">~${v.total} VP</b>` : '';
    return `<div class="player ${p.bankrupt ? 'dead' : ''}" data-pp="${i}"
      style="border-color:${COLORS[i]}">
      <div class="nm"><span>${avImg(i, 22)} ${esc(G.names[i])}</span>
        <span>${tags.join(' ')}</span></div>
      <div class="st">$${p.money} · ${p.loans} ln (−$${due}) ·
        ${bld} bldg · inc $${base}${subs ? `<b>+$${subs}</b>` : ''} ·
        <span class="${p.money + income - due < 0 ? 'net-neg' : 'net-pos'}">net
        ${p.money + income - due >= 0 ? '+' : '−'}$${Math.abs(p.money + income - due)}</span>
        · ${vpBit}</div></div>`;
  }).join('');

  // loan track — during bidding, markers claimed by bids still on the
  // bid track show in amber (they vanish, cheapest first, as players pass)
  const inBidPhase = s.phase === 'bid_initial' || s.phase === 'bid_raise';
  let pending = inBidPhase
    ? Object.values(s.bids).reduce((a, b) => a + b, 0) : 0;
  document.getElementById('lnote').textContent =
    inBidPhase && pending ? `(${pending} claimed by bids)` : '';
  let idx = 0;
  document.getElementById('ltrack').innerHTML =
    s.cfg.loanRowSizes.map((size, i) => {
      let left = 0;
      for (let k = 0; k < size; k++) if (s.loanMarkers[idx + k]) left++;
      idx += size;
      const claimed = Math.min(left, pending);
      pending -= claimed;
      const remain = left - claimed;
      return `<div class="lrow ${left === 0 ? 'expired' : ''}">
        <div class="r">rate $${s.cfg.loanRowRates[i]}</div>
        <div class="bar"><div class="fill" style="width:${100 * remain / size}%"></div>
          <div class="commit" style="width:${100 * claimed / size}%"></div></div>
        <div class="n">${left}/${size}</div></div>`;
    }).join('');

  renderBids(s); renderOrder(s); renderMarket(s); renderCities(s);
  renderActions(s); renderOver(s);
}

function renderOrder(s) {
  const inBid = s.phase === 'bid_initial' || s.phase === 'bid_raise';
  const order = inBid ? s.nextOrder : s.turnOrder;
  document.getElementById('tohead').childNodes[0].textContent = inBid
    ? 'Next round order ' : 'Turn order ';
  const dp = s.phase === 'over' ? null : E.decisionPlayer(s);
  document.getElementById('torder').innerHTML = order.map((pid, i) => {
    const cls = ['tslot'];
    let who = '<span class="who" style="color:var(--dim)">—</span>';
    if (pid !== null && pid !== undefined) {
      cls.push('filled');
      const passed = s.phase === 'buy' && s.buyPassed.has(pid);
      if (passed) cls.push('donebuy');
      if (!inBid && dp === pid) cls.push('acting');
      who = `<span class="who">${avImg(pid, 18)}${passed ? ' ✓' : ''}</span>`;
    }
    return `<div class="${cls.join(' ')}" data-slot="${i}"><span>${i + 1}${
      ['st', 'nd', 'rd'][i] || 'th'}</span>${who}</div>`;
  }).join('');
}

function renderBids(s) {
  const el = document.getElementById('btrack');
  const inBid = s.phase === 'bid_initial' || s.phase === 'bid_raise';
  document.getElementById('bidpanel').style.opacity = inBid ? 1 : .45;
  const legalBids = new Set(legalFor(s).filter(a => a[0] === 'bid')
                                       .map(a => a[1]));
  const occ = {};
  Object.keys(s.bids).forEach(pid => occ[s.bids[pid]] = Number(pid));
  el.innerHTML = s.cfg.bidSpaces.map(v => {
    const o = occ[v];
    const isLegal = legalBids.has(v);
    const dot = o !== undefined ? avImg(o, 18) : '';
    return `<div class="bspace ${isLegal ? 'legal' : ''}" data-bid="${v}">
      <span>${v}</span>${dot}</div>`;
  }).join('');
  if (viewLive) {
    el.querySelectorAll('.bspace.legal').forEach(b =>
      b.onclick = () => act(['bid', Number(b.dataset.bid)]));
  }
}

function renderMarket(s) {
  const buyable = {};
  legalFor(s).filter(a => a[0] === 'buy').forEach(a => {
    (buyable[`${a[1]},${a[2]}`] ||= []).push(a[3]);
  });
  // the market is only open during the buy phase
  const closed = s.phase === 'bailout' || s.phase === 'over';
  document.getElementById('mpanel').style.opacity = closed ? .45 : 1;
  document.getElementById('mnote').textContent =
    closed ? '— CLOSED (foreclosure sale)' : '';
  // transposed: one grid column per price row (fresh ×3 on the left,
  // bargains ×1 on the right — the direction cards slide)
  const rows = [...Array(s.display.length).keys()].reverse();  // [2,1,0]
  const cfg = s.cfg;
  let html = rows.map(r =>
    `<div class="mhead">row ${r + 1} ×${cfg.rowCostMultipliers[r]}` +
    `</div>`).join('');
  for (let c = 0; c < s.display[0].length; c++) {
    for (const r of rows) {
      const cell = s.display[r][c];
      const key = `${r},${c}`;
      const can = cell && buyable[key];
      const isSel = sel && sel.key === key;
      html += cardHTML(cell, cfg.rowCostMultipliers[r],
        (can ? 'buyable ' : '') + (isSel ? 'sel' : ''),
        `data-mc="${r},${c}" ` + (can ? `data-key="${key}"` : ''));
    }
  }
  document.getElementById('market').innerHTML = html;
  if (viewLive) {
    document.querySelectorAll('.card.buyable').forEach(el => {
      el.onclick = () => {
        const key = el.dataset.key;
        const rc = key.split(',').map(Number);
        sel = (sel && sel.key === key) ? null :
          {key, cities: buyable[key], rc,
           type: G.state.display[rc[0]][rc[1]].card.type};
        render();
      };
    });
  }
}

function sectTooltip(s, ci, t, stateSubs, citySubs) {
  const st = stateSubs.has(E.key(ci, t));
  const cs = citySubs[E.key(ci, t)];
  if (!st && cs === undefined) return '';
  const owners = {};
  for (const b of s.cities[ci][t]) {
    if (b.owner !== null) owners[b.owner] = (owners[b.owner] || 0) + 1;
  }
  const lines = [];
  if (st) lines.push(`★ state subsidy: fewest ${t} of any city — every ` +
    'owner here gets +$1/card; the zone leader also scores 1 VP per ' +
    'building at game end');
  if (cs !== undefined) lines.push(`● city subsidy: ${G.names[cs]} has ` +
    `the most here — +$1/card${st ? ' (stacks with ★ to +$3/card)' : ''}`);
  for (const pid of Object.keys(owners)) {
    const n = owners[pid];
    const per = st && cs === Number(pid) ? 3
              : (st || cs === Number(pid)) ? 1 : 0;
    if (per) lines.push(`${G.names[pid]}: +$${per * n}/rd ` +
                        `(${n} card${n > 1 ? 's' : ''} × $${per})`);
  }
  return lines.join('\n');
}

function renderCities(s) {
  const [stateSubs, citySubs] = currentSubs(s);
  document.getElementById('cities').innerHTML = s.cities.map((city, ci) => {
    const sects = E.TYPES.map(t => {
      const marks = [];
      if (stateSubs.has(E.key(ci, t))) marks.push('★');
      const cs = citySubs[E.key(ci, t)];
      if (cs !== undefined)
        marks.push(`<span style="color:${COLORS[cs]}">●</span>`);
      const tip = esc(sectTooltip(s, ci, t, stateSubs, citySubs))
        .replace(/"/g, '&quot;').replace(/\n/g, '&#10;');
      const target = sel && sel.cities.includes(ci) && t === sel.type;
      // per-player blocks: each owner's buildings grouped together
      const byOwner = new Map();
      city[t].forEach((b, k) => {
        const key = b.owner === null ? 'bank' : b.owner;
        if (!byOwner.has(key)) byOwner.set(key, []);
        byOwner.get(key).push({b, k});
      });
      const blocks = [...byOwner.entries()].map(([o, items]) => {
        const col = o === 'bank' ? '#666c7c' : PCOLS[o];
        const bs = items.map(({b, k}) =>
          `<span class="bwrap" data-b="${ci},${t},${k}"><img class="px"
             src="${bSprite(t, o === 'bank' ? null : o)}" width="20"
             height="20" alt=""><span class="binc">$${b.card.income}</span></span>`
        ).join('');
        return `<span class="block" style="border-color:${col}">${bs}</span>`;
      }).join('');
      return `<div class="sect ${CSS[t]} ${target ? 'target' : ''}"
        data-city="${ci}" ${tip ? `data-tip="${tip}"` : ''}>
        <div class="hd"><b>${t.slice(0, 3)}</b>
        <span>${marks.join(' ')}</span></div>${blocks}</div>`;
    }).join('');
    return `<div class="city"><h3>${E.cityName(ci)}</h3>${sects}</div>`;
  }).join('');
  if (viewLive && sel) {
    document.querySelectorAll('.sect.target').forEach(el => {
      el.onclick = () => act(['buy', sel.rc[0], sel.rc[1],
                              Number(el.dataset.city)]);
    });
  }
}

function renderActions(s) {
  const el = document.getElementById('actions');
  const hint = document.getElementById('hint');
  const acts = legalFor(s);
  el.innerHTML = ''; hint.textContent = '';
  document.getElementById('acthead').textContent =
    viewLive && humanTurn(s) ? 'Your move'
      : (s.phase === 'over' ? 'Game over' : 'Waiting…');
  if (viewLive && s.phase === 'over' && G.overDismissed) {
    const b = document.createElement('button');
    b.textContent = 'Show final scores';
    b.className = 'primary';
    b.onclick = () => { G.overDismissed = false; render(); };
    el.appendChild(b);
  }
  if (!viewLive || !humanTurn(s)) return;

  const mk = (label, action, primary) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (primary) b.className = 'primary';
    b.onclick = () => act(action);
    el.appendChild(b);
  };
  if (s.phase === 'bid_initial') {
    hint.textContent = 'Click a bid space (1 space = 1 loan), or pass.';
    if (acts.some(a => a[0] === 'pass'))
      mk('Pass (no loans, last turn order)', ['pass']);
  } else if (s.phase === 'bid_raise') {
    hint.textContent = 'Lowest bid: raise to a higher space, or pass to ' +
      'lock in your loans.';
    mk('Pass — take your loans', ['pass'], true);
  } else if (s.phase === 'buy') {
    hint.textContent = sel ?
      'Now click a highlighted city zone to place it.' :
      'Click a card to buy, then pick a city — or pass.';
    if (acts.some(a => a[0] === 'repay')) mk('Repay 1 loan', ['repay']);
    mk('Pass — done buying', ['pass'], !acts.some(a => a[0] === 'buy'));
  } else if (s.phase === 'bailout') {
    hint.textContent = 'Foreclosure sale: you may buy ONE building at ' +
      'printed cost.';
    s.bailoutLots.forEach((lot, i) => {
      if (!lot.bldg) return;   // already sold
      const price = lot.bldg.card.cost * s.cfg.bailoutPriceMultiplier;
      const label = `Buy ${lot.bldg.card.type.slice(0, 3).toUpperCase()} ` +
        `+$${lot.bldg.card.income}/rd in ${E.cityName(lot.city)} — $${price}`;
      if (acts.some(a => a[0] === 'bailout_buy' && a[1] === i)) {
        mk(label, ['bailout_buy', i]);
      } else {
        const b = document.createElement('button');
        b.textContent = label + ' (can\'t afford)';
        b.disabled = true;
        el.appendChild(b);
      }
    });
    mk('Pass', ['pass'], true);
  }
}

function renderOver(s) {
  const ov = document.getElementById('over');
  if (!viewLive || s.phase !== 'over' || G.overDismissed) {
    ov.classList.add('hidden');
    return;
  }
  ov.classList.remove('hidden');
  document.getElementById('banner').classList.remove('show');
  const youWon = s.winners.includes(HUMAN);
  const champ = s.winners[0];
  document.getElementById('overav').innerHTML = champ !== undefined
    ? `<img class="px" src="${avatar(champ)}" width="64" height="64" alt="">`
    : '';
  document.getElementById('overtitle').textContent =
    (youWon ? '🏆 You win!' : 'Game over — ' +
      s.winners.map(w => G.names[w]).join(' & ') + ' wins') +
    ` (${s.endCause})`;
  const rows = s.players.map((p, i) => ({
    i, vp: p.vp, money: p.money, bankrupt: p.bankrupt,
    bld: s.cities.reduce((n, c) => n + E.ownedCount(c, i), 0),
  })).sort((a, b) => b.vp - a.vp || b.money - a.money);
  const vpTie = rows.length > 1 && rows[0].vp === rows[1].vp;
  document.getElementById('scores').innerHTML =
    '<tr><th></th><th>VP</th><th>$</th><th>bldgs</th><th></th></tr>' +
    rows.map(p => `<tr><td style="color:${COLORS[p.i]}">${avImg(p.i, 18)}
      ${esc(G.names[p.i])}</td>
      <td><b>${p.vp}</b></td><td>${p.money}</td><td>${p.bld}</td>
      <td>${p.bankrupt ? '💥 bankrupt' : (s.winners.includes(p.i) ? '🏆' : '')}
      </td></tr>`).join('') +
    `<tr><td colspan="5" class="sub">VP ties break on remaining cash` +
    (vpTie ? ' — and that decided this game!' : '') + '</td></tr>';
}

// click anywhere to fast-forward a replay — but NOT the click that
// initiated the action: it bubbles here after act() starts the playback
// and would instantly self-skip every replay
document.addEventListener('click', (e) => {
  if (!playing) return;
  if (e.target.closest('button, select, label, .bspace.legal, ' +
                       '.card.buyable, .sect.target')) return;
  skipReq = true;
});

// restore new-game settings, then resume a saved game if one exists
// (artifact redeploys reload the page)
loadPrefs();
document.getElementById('steep').onchange = savePrefs;
document.getElementById('opps').onchange = savePrefs;
document.getElementById('anim').onchange = savePrefs;
if (loadGame()) render(); else newGame();
</script>
